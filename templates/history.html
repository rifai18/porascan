<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Histori Deteksi - PoraScan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>

    <style>
        * {
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #eef8f0, #f7fbf8);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        /* Aksen */
        .circle-top-1 {
            position: absolute;
            width: 170px;
            height: 170px;
            background: #2e7d32;
            border-radius: 50%;
            top: -90px;
            left: -40px;
            opacity: 0.18;
        }

        .circle-top-2 {
            position: absolute;
            width: 130px;
            height: 130px;
            background: #43a047;
            border-radius: 50%;
            top: -40px;
            left: 40px;
            opacity: 0.15;
        }

        .main-wrapper {
            position: relative;
            z-index: 2;
        }

        .page-title {
            color: #1b5e20;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .page-subtitle {
            color: #5f7161;
            font-size: 15px;
        }

        .history-card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 26px;
            overflow: hidden;
            border: none;
            transition: 0.3s;
            height: 100%;
            box-shadow:
                0 8px 25px rgba(34, 139, 34, 0.08),
                0 4px 10px rgba(0, 0, 0, 0.04);
        }

        .history-card:hover {
            transform: translateY(-5px);
        }

        .history-image {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }

        .card-body {
            padding: 22px;
        }

        .badge-history {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 8px 14px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
        }

        .disease-title {
            color: #1b5e20;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .ai-box {
            background: #f6fff7;
            border: 1px solid #dcefdc;
            border-radius: 16px;
            padding: 15px;
        }

        .ai-label {
            color: #2e7d32;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .ai-text {
            color: #5f7161;
            font-size: 14px;
            line-height: 1.7;
            text-align: justify;

            max-height: 95px;
            overflow: hidden;
            transition: 0.3s ease;
        }

        .ai-text.expanded {
            max-height: 1000px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            margin-top: 10px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .header-left {
            flex: 1;
        }

        .topbar-action {
            display: flex;
            gap: 12px;
        }

        .page-title {
            color: #1b5e20;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: #5f7161;
            font-size: 15px;
            margin-bottom: 0;
        }

        .header-wrapper {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .back-btn {
            width: 48px;
            height: 48px;
            min-width: 48px;
            border-radius: 16px;
            background: #edf7ee;
            border: 1px solid #cfe7d1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.08);
        }

        .back-btn iconify-icon {
            font-size: 22px;
            color: #2e7d32;
        }

        .back-btn:hover {
            background: #dff2e2;
            border-color: #b8dbbb;
            transform: translateY(-1px);
        }

        .back-btn:hover iconify-icon {
            color: #1b5e20;
        }

        .topbar-action {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-download {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            color: white;
            padding: 12px 22px;
            border-radius: 18px;
            border: none;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            box-shadow:
                0 5px 15px rgba(27, 94, 32, 0.22);
        }

        .btn-download:hover {
            background: linear-gradient(135deg, #14461a, #1b5e20);
            color: white;
            transform: translateY(-2px);
        }

        .empty-history {
            background: white;
            border-radius: 25px;
            padding: 50px 30px;
            text-align: center;
            box-shadow:
                0 8px 25px rgba(34, 139, 34, 0.08);
        }

        .empty-title {
            color: #1b5e20;
            font-weight: 700;
            margin-top: 15px;
        }

        .empty-subtitle {
            color: #6c757d;
        }

        .action-box {
            margin-top: 18px;
        }

        .btn-delete {
            width: 100%;
            background: #fff5f5;
            color: #dc3545;
            padding: 11px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ffd6d9;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #dc3545;
            color: white;
        }

        .read-more-btn {
            margin-top: 10px;
            background: none;
            border: none;
            padding: 0;

            color: #2e7d32;
            font-size: 14px;
            font-weight: 600;

            cursor: pointer;
        }


        @media(max-width: 768px) {

            .topbar-action {
                width: 100%;
                flex-direction: column;
            }

            .btn-home,
            .btn-download {
                width: 100%;
            }
        }

        @media print {

            body {
                background: white;
                padding: 0;
            }

            .circle-top-1,
            .circle-top-2,
            .back-btn,
            .topbar-action,
            .btn-delete,
            .read-more-btn {
                display: none !important;
            }

            .history-card {
                box-shadow: none;
                border: 1px solid #ddd;
                break-inside: avoid;
            }

            .ai-text {
                max-height: none !important;
                overflow: visible !important;
            }

            .container {
                width: 100%;
            }

        }
    </style>

</head>

<body>

    <!-- Aksen -->
    <div class="circle-top-1"></div>
    <div class="circle-top-2"></div>

    <div class="container main-wrapper">

        <!-- Header -->
        <!-- Header -->
        <div class="topbar">

            <div class="header-wrapper">

                <a href="/" class="back-btn">
                    <iconify-icon icon="solar:arrow-left-linear"></iconify-icon>
                </a>

                <div class="header-text">

                    <h1 class="page-title">
                        Histori Deteksi
                    </h1>

                    <p class="page-subtitle">
                        Riwayat hasil deteksi penyakit daun porang
                    </p>

                </div>

            </div>

            <div class="topbar-action">

                <button onclick="window.print()" class="btn-download">
                    Cetak Histori
                </button>

            </div>

        </div>

        {% if data %}

        <div class="row g-4">

            {% for item in data %}

            <div class="col-lg-4 col-md-6">

                <div class="history-card">

                    <img src="{{ url_for('static', filename='results/' + item[4]) }}" class="history-image">

                    <div class="card-body">

                        <div class="disease-title">
                            {{ item[1] }}
                        </div>

                        <div class="ai-box">

                            <div class="ai-label">
                                Penjelasan AI
                            </div>

                            <div class="ai-text" id="aiText{{ loop.index }}">
                                {{ item[5] }}
                            </div>

                            <button class="read-more-btn" onclick="toggleText({{ loop.index }}, this)">

                                Baca Selengkapnya

                            </button>

                        </div>

                        <div class="action-box">

                            <a href="/delete-history/{{ item[0] }}" class="btn-delete"
                                onclick="return confirm('Hapus histori ini?')">

                                Hapus

                            </a>

                        </div>

                    </div>

                </div>

            </div>

            {% endfor %}

        </div>

        {% else %}

        <!-- Jika histori kosong -->

        <div class="empty-history">

            <img src="{{ url_for('static', filename='logo.png') }}" width="90">

            <h3 class="empty-title">
                Belum Ada Histori
            </h3>

            <p class="empty-subtitle">
                Hasil deteksi penyakit daun porang akan muncul di sini
            </p>

        </div>

        {% endif %}

    </div>

    <script>

        function toggleText(index, button) {

            const text = document.getElementById(
                `aiText${index}`
            );

            text.classList.toggle("expanded");

            if (text.classList.contains("expanded")) {

                button.innerText = "Tampilkan Lebih Sedikit";

            } else {

                button.innerText = "Baca Selengkapnya";

            }
        }

    </script>
    <script>

        window.addEventListener("load", () => {

            const texts = document.querySelectorAll(".ai-text");

            texts.forEach((text) => {

                if (text.scrollHeight <= 95) {

                    const button =
                        text.nextElementSibling;

                    if (button) {
                        button.style.display = "none";
                    }
                }
            });

        });

    </script>

</body>

</html>
