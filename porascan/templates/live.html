<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Live Deteksi - PoraScan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>

    <style>
        * {
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #eef8f0, #f7fbf8);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        .page-title {
            color: #1b5e20;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: #5f7161;
            font-size: 15px;
            margin-bottom: 0;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .circle-top-1 {
            position: absolute;
            width: 170px;
            height: 170px;
            background: #2e7d32;
            border-radius: 50%;
            top: -90px;
            left: -40px;
            opacity: 0.18;
        }

        .circle-top-2 {
            position: absolute;
            width: 130px;
            height: 130px;
            background: #43a047;
            border-radius: 50%;
            top: -40px;
            left: 40px;
            opacity: 0.15;
        }

        .main-wrapper {
            position: relative;
            z-index: 2;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            margin-top: 10px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .header-wrapper {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .back-btn {
            width: 48px;
            height: 48px;
            min-width: 48px;
            border-radius: 16px;
            background: #edf7ee;
            border: 1px solid #cfe7d1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.08);
        }

        .back-btn iconify-icon {
            font-size: 22px;
            color: #2e7d32;
        }

        .back-btn:hover {
            background: #dff2e2;
            border-color: #b8dbbb;
            transform: translateY(-1px);
        }

        .back-btn:hover iconify-icon {
            color: #1b5e20;
        }

        .action-group {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        .action-btn {
            min-width: 210px;
            padding: 14px 22px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 15px;
            transition: 0.25s ease;
            cursor: pointer;
        }

        .live-wrapper {
            margin-top: 5px;
        }

        .btn-live {
            background: linear-gradient(135deg, #2e7d32, #43a047);
            color: white;
            box-shadow: 0 5px 15px rgba(46, 125, 50, 0.25);
        }

        .btn-live:hover {
            background: linear-gradient(135deg, #1b5e20, #388e3c);
            transform: translateY(-1px);
        }

        .btn-capture {
            background: #edf7ee;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .btn-capture:hover {
            background: #dff2e2;
        }

        video,
        img {
            width: 100%;
            max-width: 700px;
            border-radius: 24px;
            border: 4px solid #e8f5e9;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
        }

        .live-wrapper {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .camera-box,
        .result-box {
            flex: 1;
            min-width: 320px;
        }

        .result-box {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: auto;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        @media(max-width: 768px) {

            .topbar {
                margin-bottom: 28px;
            }

            .live-wrapper {
                gap: 16px;
            }

            .action-group {
                margin-top: 22px;
                gap: 12px;
            }

            .action-btn {
                width: 100%;
                min-width: unset;
            }
        }
    </style>

</head>

<body>
    <!-- Aksen -->
    <div class="circle-top-1"></div>
    <div class="circle-top-2"></div>

    <div class="container main-wrapper">

        <div class="topbar">

            <div class="header-wrapper">

                <a href="/" class="back-btn">
                    <iconify-icon icon="solar:arrow-left-linear"></iconify-icon>
                </a>

                <div class="header-text">

                    <h1 class="page-title">
                        Live Deteksi
                    </h1>

                    <p class="page-subtitle">
                        Deteksi realtime penyakit daun porang
                    </p>

                </div>

            </div>

        </div>

        <div class="live-wrapper">

            <div class="camera-box">

                <div class="video-wrapper">

                    <video id="video" autoplay playsinline></video>

                    <canvas id="overlay"></canvas>

                </div>

            </div>

        </div>

        <div class="action-group">

            <button onclick="toggleRealtime()" id="liveBtn" class="action-btn btn-live">
                Mulai Realtime
            </button>

            <button onclick="captureRealtime()" id="captureBtn" class="action-btn btn-capture" style="display:none;">
                Ambil Gambar
            </button>

        </div>

        <script>

            const video = document.getElementById('video');
            const overlay = document.getElementById('overlay');

            let latestBlob = null;

            let processing = false;
            let isRealtime = false;

            navigator.mediaDevices.getUserMedia({
                video: true
            })
                .then(stream => {
                    video.srcObject = stream;
                });

            async function sendFrame() {

                if (processing) return;

                processing = true;

                const canvas = document.createElement('canvas');

                const ctx = canvas.getContext('2d');

                canvas.width = 640;
                canvas.height = 480;

                ctx.drawImage(
                    video,
                    0,
                    0,
                    canvas.width,
                    canvas.height
                );

                canvas.toBlob(async function (blob) {

                    try {

                        const formData = new FormData();

                        formData.append(
                            'image',
                            blob,
                            'frame.jpg'
                        );

                        const response = await fetch(
                            '/live-detect',
                            {
                                method: 'POST',
                                body: formData
                            }
                        );

                        const data = await response.json();
                        drawDetections(data.detections);

                    } catch (err) {

                        console.log(err);

                    }

                    processing = false;

                    if (!isRealtime) return;
                    
                    setTimeout(() => {
                        sendFrame();
                    }, 300);

                }, 'image/jpeg', 0.4);
            }

            function toggleRealtime() {

                const btn = document.getElementById('liveBtn');

                const captureBtn = document.getElementById('captureBtn');

                if (isRealtime) {

                    isRealtime = false;

                    btn.innerText = "Mulai Realtime";

                    captureBtn.style.display = "none";

                } else {

                    isRealtime = true;

                    sendFrame();

                    btn.innerText = "Stop Realtime";

                    captureBtn.style.display = "inline-block";
                }
            }

            async function captureRealtime() {

            isRealtime = false;
        
            document.getElementById('liveBtn').innerText =
                "Mulai Realtime";
        
            document.getElementById('captureBtn').style.display =
                "none";
        
            const canvas = document.createElement('canvas');
        
            const ctx = canvas.getContext('2d');
        
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        
            ctx.drawImage(video, 0, 0);
        
            canvas.toBlob(async function (blob) {
        
                try {
        
                    const formData = new FormData();
        
                    formData.append(
                        'image',
                        blob,
                        'capture.jpg'
                    );
        
                    const response = await fetch('/detect', {
                        method: 'POST',
                        body: formData
                    });
        
                    const html = await response.text();
        
                    document.open();
                    document.write(html);
                    document.close();
        
                } catch (err) {
        
                    console.log(err);
        
                    alert('Gagal mengambil gambar');
        
                }
        
            }, 'image/jpeg', 0.9);
        
        }
            function drawDetections(detections) {

                const ctx = overlay.getContext('2d');

                overlay.width = video.videoWidth;

                overlay.height = video.videoHeight;

                ctx.clearRect(0,
                    0,
                    overlay.width,
                    overlay.height);

                detections.forEach(det => {

                    const [x1, y1, x2, y2] = det.box;

                    if (det.label.toLowerCase().includes('hawar daun')) {

                        ctx.strokeStyle = '#ff9800';

                    } else if (det.label.toLowerCase().includes('terserang hama')) {

                        ctx.strokeStyle = '#f44336';

                    } else if (det.label.toLowerCase().includes('bercak daun')) {

                        ctx.strokeStyle = '#2196f3';

                    } else if (det.label.toLowerCase().includes('virus mosaik')) {

                        ctx.strokeStyle = '#9c27b0';

                    } else {

                        ctx.strokeStyle = '#00e676';

                    }

                    ctx.lineWidth = 3;

                    ctx.strokeRect(x1,
                        y1,
                        x2 - x1,
                        y2 - y1);

                    ctx.fillStyle = ctx.strokeStyle;

                    ctx.font = '16px Arial';

                    const label = det.label + ' ' +
                        (det.confidence * 100).toFixed(1) + '%';

                    ctx.fillText(
                        label,
                        x1,
                        y1 - 10
                    );

                });

            }

        </script>
    </div>

</body>

</html>
