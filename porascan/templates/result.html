<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Deteksi - PoraScan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>

    <style>
        * {
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #eef8f0, #f7fbf8);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        /* Aksen */
        .circle-top-1 {
            position: absolute;
            width: 170px;
            height: 170px;
            background: #2e7d32;
            border-radius: 50%;
            top: -90px;
            left: -40px;
            opacity: 0.18;
        }

        .circle-top-2 {
            position: absolute;
            width: 130px;
            height: 130px;
            background: #43a047;
            border-radius: 50%;
            top: -40px;
            left: 40px;
            opacity: 0.15;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            margin-top: 10px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .main-wrapper {
            position: relative;
            z-index: 2;
        }

        .result-image {
            width: 100%;
            border-radius: 24px;
            border: 4px solid #e8f5e9;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
        }

        .content-card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 32px;
            padding: 35px;
            box-shadow:
                0 10px 35px rgba(34, 139, 34, 0.08),
                0 4px 15px rgba(0, 0, 0, 0.04);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .row {
            margin-left: 0;
            margin-right: 0;
        }

        .section-title {
            color: #2e7d32;
            font-weight: 700;
            margin-bottom: 18px;
        }

        .detection-box {
            background: #f6fff7;
            border: 1px solid #d7edd9;
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .detection-box:hover {
            transform: translateY(-2px);
            background: #f0fff2;
        }

        .disease-name {
            font-size: 18px;
            font-weight: 700;
            color: #1b5e20;
        }

        .confidence {
            font-size: 15px;
            color: #4f6b52;
            margin-top: 6px;
        }

        .progress {
            height: 10px;
            border-radius: 20px;
            background: #dcefdc;
            margin-top: 10px;
        }

        .progress-bar {
            background: linear-gradient(90deg, #2e7d32, #43a047);
        }

        .ai-card {
            background: #f6fff7;
            border: 1px solid #d7edd9;
            border-radius: 22px;
            padding: 25px;
            margin-top: 30px;
        }

        .ai-title {
            color: #1b5e20;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .ai-text {
            color: #4f4f4f;
            line-height: 1.8;
            text-align: justify;
        }

        .btn-group-custom {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .header-wrapper {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .back-btn {
            width: 48px;
            height: 48px;
            min-width: 48px;
            border-radius: 16px;
            background: #edf7ee;
            border: 1px solid #cfe7d1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.08);
        }

        .back-btn iconify-icon {
            font-size: 22px;
            color: #2e7d32;
        }

        .back-btn:hover {
            background: #dff2e2;
            border-color: #b8dbbb;
            transform: translateY(-1px);
        }

        .back-btn:hover iconify-icon {
            color: #1b5e20;
        }

        .title {
            color: #1b5e20;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #5f7161;
            font-size: 15px;
            margin-bottom: 0;
        }

        .btn-custom {
            flex: 1;
            min-width: 180px;
            border: none;
            border-radius: 16px;
            padding: 14px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-history {
            background: linear-gradient(135deg, #2e7d32, #43a047);
            color: white;
            box-shadow: 0 5px 15px rgba(46, 125, 50, 0.25);
        }

        .btn-history:hover {
            background: linear-gradient(135deg, #1b5e20, #388e3c);
            color: white;
        }

        @media(max-width: 768px) {

            .content-card {
                padding: 20px 16px;
                border-radius: 26px;
            }

            .row.g-4 {
                --bs-gutter-x: 16px;
            }

            .result-image {
                border-radius: 20px;
            }

            .btn-group-custom {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <!-- Aksen -->
    <div class="circle-top-1"></div>
    <div class="circle-top-2"></div>

    <div class="container main-wrapper">

        <div class="result-card">

            <!-- Header -->
            <div class="topbar">

                <div class="header-wrapper">

                    <a href="/" class="back-btn">
                        <iconify-icon icon="solar:arrow-left-linear"></iconify-icon>
                    </a>

                    <div class="header-text">
                        <h1 class="title mb-1">
                            Hasil Deteksi
                        </h1>

                        <p class="subtitle mb-0">
                            Hasil deteksi penyakit daun porang
                        </p>
                    </div>

                </div>
                <div class="content-card">

                    <div class="row g-4">

                        <!-- Gambar -->
                        <div class="col-lg-6">

                            <img src="{{ url_for('static', filename='results/' + result_image) }}" class="result-image">

                        </div>

                        <!-- Hasil -->
                        <div class="col-lg-6">

                            <h4 class="section-title">
                                Penyakit Terdeteksi
                            </h4>

                            {% for item in detections %}

                            <div class="detection-box">

                                <div class="disease-name">
                                    {{ item.disease }}
                                </div>

                                <div class="confidence">
                                    Akurasi: {{ item.confidence }}%
                                </div>

                                <div class="progress">

                                    <div class="progress-bar" style="width: {{ item.confidence }}%">

                                    </div>

                                </div>

                            </div>

                            {% endfor %}

                        </div>

                    </div>

                    <!-- Penjelasan AI -->
                    <div class="ai-card">

                        <h4 class="ai-title">
                            Penjelasan AI
                        </h4>

                        <div class="ai-text">
                            {{ explanation }}
                        </div>

                    </div>

                    <!-- Tombol -->
                    <div class="btn-group-custom">

                        <a href="/history" class="btn-custom btn-history">
                            Lihat Histori
                        </a>

                    </div>
                </div>

            </div>

        </div>
    </div>

</body>

</html>
